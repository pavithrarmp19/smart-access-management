<div class="forgot-container">

  <div class="forgot-card">

    <h2>Reset Password 🔐</h2>

    <input
      type="text"
      placeholder="Enter User ID"
      [(ngModel)]="userId"
    />

    <input
      type="password"
      placeholder="Enter New Password"
      [(ngModel)]="newPassword"
    />

    <button (click)="resetPassword()">
      Reset Password
    </button>

    <p routerLink="/login">
      Back to Login
    </p>

  </div>

</div>
